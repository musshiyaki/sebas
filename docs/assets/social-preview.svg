<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Sebas social preview</title>
  <desc id="desc">Sebas runs Qwen3.5-122B-A10B locally on a 16 GB MacBook Air with SSD-streamed MoE experts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="48%" stop-color="#243447"/>
      <stop offset="100%" stop-color="#1f2933"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 520 C180 478 310 504 462 444 C640 373 749 365 916 410 C1054 447 1168 436 1280 394 L1280 640 L0 640 Z" fill="#0f172a" opacity="0.72"/>
  <path d="M1024 0 L1280 0 L1280 640 L902 640 C1000 485 1056 326 1024 0 Z" fill="#0b1220" opacity="0.48"/>
  <rect x="64" y="56" width="1152" height="528" rx="30" fill="#0b1220" opacity="0.62" filter="url(#shadow)"/>
  <rect x="64" y="56" width="1152" height="528" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="92" y="84" width="1096" height="8" rx="4" fill="url(#accent)"/>

  <g font-family="Inter, SF Pro Display, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" fill="#f8fafc">
    <text x="104" y="164" font-size="54" font-weight="800" letter-spacing="0">Sebas</text>
    <text x="104" y="250" font-size="72" font-weight="800" letter-spacing="0">Qwen3.5-122B-A10B</text>
    <text x="104" y="318" font-size="46" font-weight="700" letter-spacing="0">on a 16 GB MacBook Air</text>
    <text x="104" y="374" font-size="30" font-weight="500" fill="#cbd5e1" letter-spacing="0">SSD-streamed MoE expert weights for local Apple Silicon inference</text>

    <g transform="translate(104 430)">
      <rect x="0" y="0" width="222" height="76" rx="16" fill="#122033" stroke="#34d399" stroke-opacity="0.45"/>
      <text x="24" y="31" font-size="20" font-weight="600" fill="#86efac">decode</text>
      <text x="24" y="60" font-size="30" font-weight="800">~3.2 tok/s</text>

      <rect x="250" y="0" width="212" height="76" rx="16" fill="#122033" stroke="#38bdf8" stroke-opacity="0.45"/>
      <text x="274" y="31" font-size="20" font-weight="600" fill="#7dd3fc">TTFT</text>
      <text x="274" y="60" font-size="30" font-weight="800">~16.4s</text>

      <rect x="490" y="0" width="278" height="76" rx="16" fill="#122033" stroke="#facc15" stroke-opacity="0.45"/>
      <text x="514" y="31" font-size="20" font-weight="600" fill="#fde68a">engine</text>
      <text x="514" y="60" font-size="30" font-weight="800">Metal + SSD I/O</text>
    </g>

    <g transform="translate(880 142)">
      <rect x="0" y="0" width="260" height="318" rx="22" fill="#e5e7eb"/>
      <rect x="18" y="18" width="224" height="282" rx="14" fill="#111827"/>
      <rect x="74" y="302" width="112" height="10" rx="5" fill="#94a3b8"/>
      <circle cx="130" cy="36" r="4" fill="#64748b"/>
      <text x="42" y="96" font-size="23" font-weight="800" fill="#f8fafc">16 GB</text>
      <text x="42" y="129" font-size="18" font-weight="600" fill="#93c5fd">MacBook Air</text>
      <path d="M42 174 H218" stroke="#334155" stroke-width="2"/>
      <text x="42" y="214" font-size="19" font-weight="700" fill="#86efac">local runtime</text>
      <text x="42" y="248" font-size="18" font-weight="600" fill="#cbd5e1">not resident RAM</text>
    </g>
  </g>
</svg>
